# .github/workflows/fetch-meets.yml
#
# Runs the World Athletics calendar scraper on a schedule and commits
# the updated meets.json file back to the repository.
#
# SETUP:
#   1. In your GitHub repo → Settings → Secrets and variables → Actions
#   2. Add two repository secrets:
#        WA_API_ENDPOINT  →  the AWS AppSync URL from DevTools
#        WA_API_KEY       →  the x-api-key value from DevTools
#   3. Commit this file to .github/workflows/fetch-meets.yml
#   4. The workflow runs automatically every 6 hours, or you can
#      trigger it manually: Actions tab → "Fetch athletics calendar" → Run workflow

name: Fetch athletics calendar

on:
  schedule:
    # Runs at 00:00, 06:00, 12:00, 18:00 UTC every day
    - cron: '0 0,6,12,18 * * *'

  # Lets you trigger a run manually from the Actions tab
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # needed to commit the updated JSON back

    steps:
      # 1. Check out the repository
      - name: Check out repo
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install requests

      # 4. Run the scraper
      #    Secrets are injected as environment variables
      - name: Run scraper
        env:
          WA_API_ENDPOINT: ${{ secrets.WA_API_ENDPOINT }}
          WA_API_KEY:      ${{ secrets.WA_API_KEY }}
        run: python scripts/fetch_calendar.py

      # 5. Commit the updated data file only if it changed
      - name: Commit updated meets.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/meets.json
          # Only commit if the file actually changed
          if git diff --staged --quiet; then
            echo "No changes to meets.json — skipping commit"
          else
            MEET_COUNT=$(python -c "import json; d=json.load(open('data/meets.json')); print(d['count'])")
            git commit -m "Update meets.json — ${MEET_COUNT} meets ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
